spring.application.name=api-gateway

server.port=8082

spring.cloud.gateway.server.webflux.routes[0].id=account

spring.cloud.gateway.server.webflux.routes[0].uri=http://localhost:8080

spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/accounts/**


spring.cloud.gateway.server.webflux.routes[1].id=loan

spring.cloud.gateway.server.webflux.routes[1].uri=http://localhost:8081

spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/loans/**